spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${PLAYMATE_DB_HOST:127.0.0.1}:${PLAYMATE_DB_PORT:13306}/${PLAYMATE_DB_NAME:playmate_space}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${PLAYMATE_DB_USERNAME:playmate}
    # playmate_dev_password is only a local Docker example password. Do not use it on cloud servers.
    password: ${PLAYMATE_DB_PASSWORD:playmate_dev_password}

logging:
  level:
    com.playmate.space.mapper: debug

playmate:
  minio:
    endpoint: ${PLAYMATE_MINIO_ENDPOINT:http://127.0.0.1:19000}
    access-key: ${PLAYMATE_MINIO_ACCESS_KEY:playmate_minio}
    # playmate_minio_dev_password is only a local Docker example password. Do not use it on cloud servers.
    secret-key: ${PLAYMATE_MINIO_SECRET_KEY:playmate_minio_dev_password}
    bucket: ${PLAYMATE_MINIO_BUCKET:playmate-files}
    public-base-url: ${PLAYMATE_MINIO_PUBLIC_BASE_URL:http://127.0.0.1:19000}
