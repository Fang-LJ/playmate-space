services:
  playmate-mysql:
    image: mysql:8.0
    container_name: playmate-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - playmate_mysql_data:/var/lib/mysql
      - ../docs/sql/p0_init.sql:/docker-entrypoint-initdb.d/001-p0_init.sql:ro
      - ../docs/sql/p1_001_activity_collaboration.sql:/docker-entrypoint-initdb.d/002-p1_activity_collaboration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - playmate-local

  playmate-minio:
    image: minio/minio:latest
    container_name: playmate-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_HOST_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - playmate_minio_data:/data
    networks:
      - playmate-local

  playmate-minio-init:
    image: minio/minio:latest
    container_name: playmate-minio-init
    depends_on:
      - playmate-minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://playmate-minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc anonymous set download local/$${MINIO_BUCKET};
      echo 'minio bucket ready: '$${MINIO_BUCKET};
      "
    networks:
      - playmate-local

  playmate-redis:
    image: redis:7.2-alpine
    container_name: playmate-redis
    profiles:
      - optional
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - playmate_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - playmate-local

volumes:
  playmate_mysql_data:
    name: playmate_mysql_data
  playmate_minio_data:
    name: playmate_minio_data
  playmate_redis_data:
    name: playmate_redis_data

networks:
  playmate-local:
    name: playmate-local
